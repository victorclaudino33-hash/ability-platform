spring.application.name=ability-platform

# Database - Railway environment variables
spring.datasource.url=jdbc:postgresql://{POSTGRES_HOST:postgres.railway.internal}:{POSTGRES_PORT:5432}/{POSTGRES_DB:railway}
spring.datasource.username={POSTGRES_USER:postgres}
spring.datasource.password={POSTGRES_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Server port - Railway injects PORT variable
server.port={PORT:8080}
