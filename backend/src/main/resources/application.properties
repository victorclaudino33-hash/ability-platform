spring.application.name=ability-platform

# Database configuration using Railway environment variables
spring.datasource.url=jdbc:postgresql://\:\/\
spring.datasource.username=\
spring.datasource.password=\

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server port: Use Railway's PORT variable, default to 8080 for local dev
server.port=\

# Optional: Enable health endpoint for Railway healthchecks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always